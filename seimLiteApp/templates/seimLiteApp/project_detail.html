{% extends "base.html" %}

{% block title %}Project Details{% endblock %}

{% block content %}

<h3>{{ project.title }}</h3>
<p class="text-muted">{{ project.description }}</p>

<hr>

<h5>Related Logs</h5>

{% for log in logs %}

<div class="card mb-2">
  <div class="card-body">

    <strong>{{ log.level }}</strong> | {{ log.source }}
    <p>{{ log.message }}</p>
    <small class="text-muted">{{ log.timestamp }}</small>

    <div class="mt-2">
<a href="{% url 'investigate_log' log.id %}" class="btn btn-sm btn-outline-danger">
                Investigate
</a>
    </div>

  </div>
</div>

{% endfor %}

{% endblock %}
