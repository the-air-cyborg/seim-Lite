{% extends "base.html" %}

{% block title %} Projects {% endblock %}

{% block content %}
<div class="container mt-4">
  <h2 class="mb-4">Projects</h2>

  {% for project in projects %}
    <div class="card mb-3 shadow-sm">
      <div class="card-body">
        <h4>{{ project.title }}</h4>
        <p class="text-muted">{{ project.description }}</p>
      </div>
    </div>
  {% empty %}
    <p>No projects found</p>
  {% endfor %}

</div>
{% endblock %}
